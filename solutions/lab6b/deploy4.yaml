apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: webserver
  name: webserver
spec:
  replicas: 10
  selector:
    matchLabels:
      app: webserver
  template:
    metadata:
      labels:
        app: webserver
    spec:
      containers:

      # =====================================================
      # BEGIN CHANGE - Lab 6a.2 Phase 5
      #
      # Replace:
      #
      # - image: nginx:alpine
      #
      # with the unprivileged NGINX image.
      # =====================================================
      - image: nginxinc/nginx-unprivileged
      # =====================================================
      # END CHANGE - Lab 6a.2 Phase 5
      # =====================================================

        name: nginx
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault

        # =====================================================
        # BEGIN CHANGE - Lab 6a.2 Phase 5
        #
        # Replace:
        #
        # containerPort: 80
        #
        # with:
        #
        # containerPort: 8080
        #
        # The unprivileged NGINX image listens on port 8080.
        # =====================================================
        ports:
        - containerPort: 8080
        # =====================================================
        # END CHANGE - Lab 6a.2 Phase 5
        # =====================================================

        resources:
          requests:
            cpu: 100m
            memory: 100Mi
          limits:
            cpu: 100m
            memory: 100Mi
