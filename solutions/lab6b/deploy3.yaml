apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: webserver
  name: webserver
spec:
  replicas: 10
  selector:
    matchLabels:
      app: webserver
  template:
    metadata:
      labels:
        app: webserver
    spec:
      containers:
      - image: nginx:alpine
        name: nginx
        securityContext:
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
          seccompProfile:
            type: RuntimeDefault
        ports:
        - containerPort: 80

        # =====================================================
        # BEGIN REPLACEMENT - Lab 6a.2 Phase 4
        #
        # Replace:
        #
        # resources: {}
        #
        # with explicit CPU and memory requests and limits.
        # This allows the Pod to satisfy the namespace ResourceQuota.
        # =====================================================
        resources:
          requests:
            cpu: 100m
            memory: 100Mi
          limits:
            cpu: 100m
            memory: 100Mi
        # =====================================================
        # END REPLACEMENT - Lab 6a.2 Phase 4
        # =====================================================
